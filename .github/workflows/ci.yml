name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio
      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Type-check + build
        working-directory: frontend
        run: npm run build
      - name: Frontend unit tests (vitest)
        working-directory: frontend
        run: npm test

  docker-compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        run: docker compose config >/dev/null && echo "docker compose config OK"

  secret-scan-lite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan working tree for secret patterns
        run: |
          set -e
          # High-signal secret patterns. .env.example (placeholders) is allowed.
          PATTERN='(sk-[A-Za-z0-9]{20,}|DASHSCOPE_API_KEY[[:space:]]*=[[:space:]]*[A-Za-z0-9]|DEEPSEEK_API_KEY[[:space:]]*=[[:space:]]*[A-Za-z0-9]|postgres(ql)?://[^[:space:]"'"'"']+:[^[:space:]"'"'"']+@|AKIA[0-9A-Z]{16}|LTAI[A-Za-z0-9]{12,})'
          if grep -rEn --binary-files=without-match \
               --exclude-dir=.git --exclude-dir=node_modules --exclude='*.example' \
               "$PATTERN" . ; then
            echo "::error::Potential secret found in working tree"; exit 1
          fi
          echo "No secret patterns found."
      - name: Ensure no committed .env
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "::error::A .env file is committed"; exit 1
          fi
          echo "No committed .env."
