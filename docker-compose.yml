services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # Optional: offline demo mode needs no secrets. Provide a .env (copied from
    # .env.example) only to enable live Qwen/DeepSeek mode.
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    restart: unless-stopped
